<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>OneChat</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      --glass:   rgba(17, 21, 30, 0.66);
      --glass-2: rgba(38, 44, 58, 0.55);
      --glass-3: rgba(255, 255, 255, 0.06);
      --hair:    rgba(255, 255, 255, 0.10);
      --hair-2:  rgba(255, 255, 255, 0.16);
      --text:    #F1F5F9;
      --soft:    #A6B2C6;
      --faint:   #6B7890;
      --blue:    #2F6BFF;
      --teal:    #18C7A7;
      --danger:  #F43F5E;
      --shadow:  0 18px 50px rgba(0,0,0,.45);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: transparent; overflow: hidden;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; font-size: 12.5px;
      color: var(--text); -webkit-user-select: none; user-select: none;
      -webkit-font-smoothing: antialiased; }
    svg { width: 17px; height: 17px; display: block; }
    #wrap { display: flex; height: 100%; gap: 8px; padding: 7px; }

    /* ---------- RAIL (the collapsed 3-icon comm bar) ---------- */
    #rail {
      width: 54px; flex: 0 0 54px; height: 100%;
      background: var(--glass); border: 1px solid var(--hair); border-radius: 20px;
      box-shadow: var(--shadow); backdrop-filter: blur(22px) saturate(160%);
      -webkit-backdrop-filter: blur(22px) saturate(160%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; padding: 12px 0; -webkit-app-region: drag;
    }
    .logo { width: 38px; height: 38px; border-radius: 13px; position: relative;
      background: linear-gradient(135deg, var(--blue), var(--teal));
      box-shadow: 0 0 0 1px rgba(255,255,255,.14), 0 6px 18px rgba(47,107,255,.45);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 800; font-size: 18px;
      -webkit-app-region: no-drag; cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease; }
    .logo:hover { transform: scale(1.06); box-shadow: 0 0 0 1px rgba(255,255,255,.2), 0 8px 24px rgba(47,107,255,.6); }
    .logo:active { transform: scale(.94); }
    .badge { position: absolute; top: -5px; right: -5px; min-width: 17px; height: 17px;
      padding: 0 4px; border-radius: 9px; background: var(--danger); color: #fff;
      font-size: 9.5px; font-weight: 800; display: flex; align-items: center;
      justify-content: center; border: 2px solid #11151e; }
    .ico { -webkit-app-region: no-drag; cursor: pointer; width: 34px; height: 30px;
      border: 0; border-radius: 11px; background: var(--glass-3); color: var(--soft);
      display: flex; align-items: center; justify-content: center;
      transition: background .18s ease, color .18s ease, transform .18s ease; }
    .ico:hover { background: var(--hair); color: var(--text); transform: translateY(-1px); }
    .ico:active { transform: scale(.92); }
    .ico.primary { background: linear-gradient(135deg, var(--blue), #4f86ff); color: #fff;
      box-shadow: 0 5px 14px rgba(47,107,255,.4); }
    .ico.primary:hover { filter: brightness(1.08); }
    .ico.close:hover { background: rgba(244,63,94,.18); color: #ff8696; }
    .chev { transition: transform .26s cubic-bezier(.4,0,.2,1); }
    body.expanded .chev { transform: rotate(180deg); }

    /* ---------- DRAWER (expanded hub) ---------- */
    #drawer { flex: 1; height: 100%; display: none; flex-direction: column;
      background: var(--glass); border: 1px solid var(--hair); border-radius: 20px;
      box-shadow: var(--shadow); backdrop-filter: blur(22px) saturate(160%);
      -webkit-backdrop-filter: blur(22px) saturate(160%); overflow: hidden; }
    body.expanded #drawer { display: flex; animation: slideIn .26s cubic-bezier(.16,1,.3,1); }
    @keyframes slideIn { from { opacity: 0; transform: translateX(14px); } to { opacity: 1; transform: none; } }

    .search { margin: 9px; height: 34px; display: flex; align-items: center; gap: 7px;
      padding: 0 11px; background: var(--glass-3); border: 1px solid var(--hair); border-radius: 12px; }
    .search:focus-within { border-color: rgba(47,107,255,.55); }
    .search svg { width: 15px; height: 15px; color: var(--faint); }
    .search input { border: 0; outline: 0; background: transparent; flex: 1; color: var(--text);
      font-family: inherit; font-size: 12.5px; }
    .search input::placeholder { color: var(--faint); }

    .scroll { flex: 1; overflow-y: auto; padding: 2px 7px 8px; }
    .empty { color: var(--soft); font-size: 12px; line-height: 1.7; text-align: center; padding: 28px 14px; }
    .empty code { display: inline-block; margin-top: 6px; padding: 4px 8px; border-radius: 7px;
      background: var(--glass-3); border: 1px solid var(--hair); color: var(--text); font-size: 10.5px; }
    .scroll::-webkit-scrollbar { width: 6px; }
    .scroll::-webkit-scrollbar-thumb { background: var(--hair); border-radius: 3px; }
    .thread { display: flex; align-items: center; gap: 9px; padding: 8px; border-radius: 13px;
      cursor: pointer; transition: background .15s ease; }
    .thread:hover { background: var(--glass-3); }
    .av { width: 30px; height: 30px; border-radius: 10px; flex: 0 0 30px; display: flex;
      align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 10.5px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.12); }
    .tbody { min-width: 0; flex: 1; }
    .tname { font-weight: 600; font-size: 12.5px; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tprev { color: var(--soft); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tplat { font-size: 8.5px; font-weight: 700; letter-spacing: .03em; text-transform: uppercase;
      padding: 2px 6px; border-radius: 6px; color: var(--soft); background: var(--glass-3);
      border: 1px solid var(--hair); }

    /* conversation */
    #convo { display: none; flex-direction: column; height: 100%; }
    body.inconvo #list { display: none; }
    body.inconvo #convo { display: flex; animation: slideIn .22s cubic-bezier(.16,1,.3,1); }
    .chead { display: flex; align-items: center; gap: 8px; padding: 9px 11px 6px; }
    .iconbtn { -webkit-app-region: no-drag; cursor: pointer; width: 28px; height: 28px; border: 0;
      border-radius: 9px; background: var(--glass-3); color: var(--soft); display: flex;
      align-items: center; justify-content: center; transition: background .15s, color .15s; }
    .iconbtn:hover { background: var(--hair); color: var(--text); }
    .cname { font-weight: 700; font-size: 14px; color: var(--text); }
    .guard { margin: 0 11px 7px; padding: 5px 9px; display: flex; align-items: center; gap: 6px;
      background: rgba(244,63,94,.12); color: #ffa7b2; font-size: 10px; font-weight: 600;
      border-radius: 9px; border: 1px solid rgba(244,63,94,.2); }
    .guard .dotr { width: 6px; height: 6px; border-radius: 50%; background: var(--danger); flex: 0 0 6px; }
    .msgs { flex: 1; overflow-y: auto; padding: 4px 11px; display: flex; flex-direction: column; gap: 6px; }
    .bub { max-width: 80%; padding: 7px 10px; border-radius: 13px; font-size: 12px; line-height: 1.35; }
    .bub.them { background: var(--glass-2); align-self: flex-start; border-bottom-left-radius: 4px;
      border: 1px solid var(--hair); }
    .bub.me { background: linear-gradient(135deg, var(--blue), #4f86ff); color: #fff;
      align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 3px 10px rgba(47,107,255,.32); }
    .composer { display: flex; align-items: center; gap: 7px; padding: 9px; border-top: 1px solid var(--hair); }
    .composer input { -webkit-app-region: no-drag; flex: 1; height: 32px; border: 1px solid var(--hair);
      border-radius: 12px; background: var(--glass-3); padding: 0 12px; color: var(--text);
      font-family: inherit; font-size: 12.5px; outline: 0; }
    .composer input:focus { border-color: rgba(47,107,255,.55); }
    .send { -webkit-app-region: no-drag; cursor: pointer; width: 32px; height: 32px; flex: 0 0 32px;
      border: 0; border-radius: 12px; background: linear-gradient(135deg, var(--blue), #4f86ff);
      color: #fff; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 12px rgba(47,107,255,.4); transition: filter .15s, transform .15s; }
    .send:hover { filter: brightness(1.08); }
    .send:active { transform: scale(.92); }

    @media (prefers-reduced-motion: reduce) {
      *, #drawer, #convo { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <div id="wrap">
    <div id="drawer">
      <div id="list">
        <div class="search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="search" placeholder="Search messages, people, apps" />
        </div>
        <div class="scroll" id="threads"></div>
      </div>

      <div id="convo">
        <div class="chead">
          <button class="iconbtn" id="back" title="Back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <div>
            <div class="cname" id="cname"></div>
            <div class="tplat" id="cplat" style="display:inline-block; margin-top:3px"></div>
          </div>
        </div>
        <div class="guard"><span class="dotr"></span><span id="guard"></span></div>
        <div class="msgs" id="msgs"></div>
        <div class="composer">
          <input id="reply" placeholder="Message" />
          <button class="send" id="sendBtn" title="Send">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>

    <div id="rail">
      <div class="logo" id="logo" title="Open OneChat">
        <svg viewBox="0 0 24 24" style="width:23px;height:23px"><path fill="#fff" d="M12 3.2c-5 0-9 3.35-9 7.5 0 2.36 1.3 4.46 3.36 5.84-.18 1.02-.78 2.2-1.76 3.16 1.66-.2 3.22-.86 4.3-1.78.92.2 1.9.38 3.1.38 5 0 9-3.35 9-7.5S17 3.2 12 3.2z"/><circle cx="8.4" cy="10.7" r="1.5" fill="#2563EB"/><circle cx="12" cy="10.7" r="1.5" fill="#2563EB"/><circle cx="15.6" cy="10.7" r="1.5" fill="#2563EB"/></svg>
        <span class="badge" id="unread">2</span>
      </div>
      <button class="ico primary" id="toggle" title="Open">
        <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="ico close" id="close" title="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>

  <script>
    const PLAT = { Telegram:'#229ED9', Discord:'#5865F2', Gmail:'#EA4335', iMessage:'#34C759', Instagram:'#C13584', SMS:'#2F6BFF' };
    // REAL data only — populated by the connectors (Telegram first, then
    // Gmail, SMS...). Empty until you connect an app. No simulated chats.
    const DATA = (window.oneChatWidget && window.oneChatWidget.liveData) || [];

    const W = window.oneChatWidget || { setExpanded(){}, close(){} };
    const $ = (id) => document.getElementById(id);
    let current = null;

    function renderThreads(filter='') {
      const q = filter.trim().toLowerCase();
      $('threads').innerHTML = '';
      if (DATA.length === 0) {
        $('threads').innerHTML =
          '<div class="empty"><b>No connected apps yet</b><br>' +
          'Connect Telegram to see your real chats:<br>' +
          '<code>cd connectors/telegram &amp;&amp; npm run login</code></div>';
        return;
      }
      DATA.filter(c => !q || (c.name+' '+c.app+' '+c.msgs.at(-1).t).toLowerCase().includes(q))
        .forEach(c => {
          const row = document.createElement('div');
          row.className = 'thread';
          row.innerHTML =
            `<div class="av" style="background:${PLAT[c.app]||'#6B7890'}">${c.initials}</div>` +
            `<div class="tbody"><div class="tname">${c.name}</div>` +
            `<div class="tprev">${c.msgs.at(-1).t}</div></div>` +
            `<div class="tplat">${c.app}</div>`;
          row.onclick = () => openConvo(c.id);
          $('threads').appendChild(row);
        });
    }
    function openConvo(id) {
      current = DATA.find(c => c.id === id);
      $('cname').textContent = current.name;
      $('cplat').textContent = current.app;
      $('guard').textContent = `Sending via ${current.app} — check recipient`;
      drawMsgs();
      document.body.classList.add('inconvo');
    }
    function drawMsgs() {
      $('msgs').innerHTML = '';
      current.msgs.forEach(m => {
        const b = document.createElement('div');
        b.className = 'bub ' + (m.s === 'me' ? 'me' : 'them');
        b.textContent = m.t;
        $('msgs').appendChild(b);
      });
      $('msgs').scrollTop = $('msgs').scrollHeight;
    }

    function toggleHub() {
      const expanded = !document.body.classList.contains('expanded');
      document.body.classList.toggle('expanded', expanded);
      W.setExpanded(expanded);
      if (expanded) renderThreads();
    }
    $('toggle').onclick = toggleHub;
    $('logo').onclick = toggleHub; // the "1" is the primary opener
    $('close').onclick = () => W.close();
    $('back').onclick = () => document.body.classList.remove('inconvo');
    $('search').oninput = (e) => renderThreads(e.target.value);
    $('sendBtn').onclick = () => {
      const v = $('reply').value.trim();
      if (!v || !current) return;
      current.msgs.push({ s:'me', t:v }); $('reply').value = ''; drawMsgs();
    };
    $('reply').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('sendBtn').click(); });

    renderThreads();
  </script>
</body>
</html>
