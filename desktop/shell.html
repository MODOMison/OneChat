<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>OneChat</title>
  <style>
    :root {
      --blue:#2563EB; --ink:#172033; --soft:#475467; --faint:#667085;
      --line:#E7EDF6; --bg:#F7FBFF; --them:#EEF2F8;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: transparent; overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif; font-size: 12.5px; color: var(--ink);
      -webkit-user-select: none; user-select: none; }
    #wrap { display: flex; height: 100%; gap: 6px; padding: 6px; }

    /* ---- RAIL (always visible, the collapsed widget) ---- */
    #rail {
      width: 52px; flex: 0 0 52px; height: 100%;
      background: rgba(255,255,255,0.92); border: 1px solid var(--line); border-radius: 18px;
      box-shadow: 0 6px 22px rgba(20,40,80,.18); backdrop-filter: blur(6px);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 7px; padding: 9px 0; -webkit-app-region: drag;
    }
    .logo { width: 34px; height: 34px; border-radius: 11px; position: relative;
      background: linear-gradient(135deg, #2F6BFF, #18C7A7); display: flex;
      align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 16px; }
    .badge { position: absolute; top: -4px; right: -4px; min-width: 16px; height: 16px;
      padding: 0 3px; border-radius: 8px; background: #D92D20; color: #fff; font-size: 9px;
      font-weight: 800; display: flex; align-items: center; justify-content: center;
      border: 1.5px solid #fff; }
    .ico { -webkit-app-region: no-drag; cursor: pointer; width: 34px; height: 30px; margin: 3px 0;
      border: 0; border-radius: 10px; background: #EFF4FF; color: var(--ink); font-size: 14px; font-weight: 700; }
    .ico.primary { background: var(--blue); color: #fff; }
    .ico.close { background: #FFF0F0; color: #D92D20; font-size: 12px; }

    /* ---- DRAWER (shown only when expanded) ---- */
    #drawer { flex: 1; height: 100%; display: none; flex-direction: column;
      background: rgba(255,255,255,0.97); border: 1px solid var(--line); border-radius: 18px;
      overflow: hidden; box-shadow: 0 6px 22px rgba(20,40,80,.18); }
    body.expanded #drawer { display: flex; }

    .search { margin: 8px; height: 30px; display: flex; align-items: center; gap: 6px;
      padding: 0 10px; background: var(--bg); border: 1px solid var(--line); border-radius: 14px; }
    .search input { border: 0; outline: 0; background: transparent; flex: 1; font-size: 12.5px; color: var(--ink); }

    .scroll { flex: 1; overflow-y: auto; padding: 0 8px 8px; }
    .thread { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: 12px; cursor: pointer; }
    .thread:hover { background: var(--bg); }
    .av { width: 28px; height: 28px; border-radius: 9px; flex: 0 0 28px; display: flex;
      align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 10px; }
    .tbody { min-width: 0; flex: 1; }
    .tname { font-weight: 700; font-size: 12.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tprev { color: var(--faint); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tplat { font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 7px; color: var(--soft); background: var(--them); }

    /* conversation */
    #convo { display: none; flex-direction: column; height: 100%; }
    body.inconvo #list { display: none; }
    body.inconvo #convo { display: flex; }
    .chead { display: flex; align-items: center; gap: 8px; padding: 8px 10px; }
    .back { -webkit-app-region: no-drag; cursor: pointer; border: 0; background: transparent; color: var(--blue); font-size: 20px; line-height: 1; }
    .cname { font-weight: 800; font-size: 14px; }
    .guard { margin: 0 10px 6px; padding: 4px 8px; background: #FEF3F2; color: #D92D20;
      font-size: 10px; font-weight: 700; border-radius: 7px; }
    .msgs { flex: 1; overflow-y: auto; padding: 4px 10px; display: flex; flex-direction: column; gap: 5px; }
    .bub { max-width: 80%; padding: 6px 9px; border-radius: 11px; font-size: 12px; line-height: 1.3; }
    .bub.them { background: var(--them); align-self: flex-start; border-bottom-left-radius: 3px; }
    .bub.me { background: var(--blue); color: #fff; align-self: flex-end; border-bottom-right-radius: 3px; }
    .composer { display: flex; align-items: center; gap: 6px; padding: 8px; border-top: 1px solid var(--line); }
    .composer input { -webkit-app-region: no-drag; flex: 1; height: 30px; border: 0; border-radius: 14px;
      background: var(--bg); padding: 0 12px; font-size: 12.5px; outline: 0; color: var(--ink); }
    .send { -webkit-app-region: no-drag; cursor: pointer; height: 30px; padding: 0 13px; border: 0;
      border-radius: 14px; background: var(--blue); color: #fff; font-weight: 700; font-size: 12px; }
  </style>
</head>
<body>
  <div id="wrap">
    <div id="drawer">
      <div id="list">
        <div class="search">
          <span style="color:#667085">⌕</span>
          <input id="search" placeholder="Search messages, people, apps" />
        </div>
        <div class="scroll" id="threads"></div>
      </div>

      <div id="convo">
        <div class="chead">
          <button class="back" id="back">‹</button>
          <div>
            <div class="cname" id="cname"></div>
            <div class="tplat" id="cplat" style="display:inline-block"></div>
          </div>
        </div>
        <div class="guard" id="guard"></div>
        <div class="msgs" id="msgs"></div>
        <div class="composer">
          <input id="reply" placeholder="Message" />
          <button class="send" id="sendBtn">Send</button>
        </div>
      </div>
    </div>
    <div id="rail">
      <div class="logo">1<span class="badge" id="unread">2</span></div>
      <button class="ico primary" id="toggle" title="Open">‹</button>
      <button class="ico close" id="close" title="Close">✕</button>
    </div>
  </div>

  <script>
    // Compact seed so the overlay is lively without the heavy app.
    const PLAT = { Telegram:'#229ED9', Discord:'#5865F2', Gmail:'#D92D20', iMessage:'#0F9F6E', Instagram:'#C13584', SMS:'#2563EB' };
    const DATA = [
      { id:'elana', name:'Elana Aftahi', app:'Telegram', initials:'EA',
        msgs:[{s:'them',t:'omw to the studio, save me a seat!'},{s:'me',t:'Got you a spot by the window.'}] },
      { id:'studio', name:'Studio Group', app:'Discord', initials:'SG',
        msgs:[{s:'them',t:'Upload the Project 3 deck here.'}] },
      { id:'amelia', name:'Amelia Yum', app:'iMessage', initials:'AY',
        msgs:[{s:'them',t:'Can you check the floating hub sketch?'},{s:'me',t:'Yes — recipient area is bigger now.'}] },
      { id:'prof', name:'Professor Lee', app:'Gmail', initials:'PL',
        msgs:[{s:'them',t:'I left feedback on your analysis.'}] },
      { id:'mom', name:'Mom', app:'SMS', initials:'M',
        msgs:[{s:'them',t:'Call me when you are free 💙'}] },
    ];

    const W = window.oneChatWidget || { setExpanded(){}, close(){} };
    const $ = (id) => document.getElementById(id);
    let current = null;

    function renderThreads(filter='') {
      const q = filter.trim().toLowerCase();
      $('threads').innerHTML = '';
      DATA.filter(c => !q || (c.name+' '+c.app+' '+c.msgs.at(-1).t).toLowerCase().includes(q))
        .forEach(c => {
          const row = document.createElement('div');
          row.className = 'thread';
          row.innerHTML =
            `<div class="av" style="background:${PLAT[c.app]||'#667085'}">${c.initials}</div>` +
            `<div class="tbody"><div class="tname">${c.name}</div>` +
            `<div class="tprev">${c.msgs.at(-1).t}</div></div>` +
            `<div class="tplat">${c.app}</div>`;
          row.onclick = () => openConvo(c.id);
          $('threads').appendChild(row);
        });
    }

    function openConvo(id) {
      current = DATA.find(c => c.id === id);
      $('cname').textContent = current.name;
      $('cplat').textContent = current.app;
      $('guard').textContent = `Sending via ${current.app} — check recipient`;
      drawMsgs();
      document.body.classList.add('inconvo');
    }
    function drawMsgs() {
      $('msgs').innerHTML = '';
      current.msgs.forEach(m => {
        const b = document.createElement('div');
        b.className = 'bub ' + (m.s === 'me' ? 'me' : 'them');
        b.textContent = m.t;
        $('msgs').appendChild(b);
      });
      $('msgs').scrollTop = $('msgs').scrollHeight;
    }

    $('toggle').onclick = () => {
      const expanded = !document.body.classList.contains('expanded');
      document.body.classList.toggle('expanded', expanded);
      $('toggle').textContent = expanded ? '›' : '‹';
      W.setExpanded(expanded);
      if (expanded) renderThreads();
    };
    $('close').onclick = () => W.close();
    $('back').onclick = () => document.body.classList.remove('inconvo');
    $('search').oninput = (e) => renderThreads(e.target.value);
    $('sendBtn').onclick = () => {
      const v = $('reply').value.trim();
      if (!v || !current) return;
      current.msgs.push({ s:'me', t:v }); $('reply').value = ''; drawMsgs();
    };
    $('reply').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('sendBtn').click(); });

    renderThreads();
  </script>
</body>
</html>
