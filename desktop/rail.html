<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    :root { --glass: rgba(17,21,30,0.66); --glass3: rgba(255,255,255,0.06);
      --hair: rgba(255,255,255,0.10); --blue:#2F6BFF; --teal:#18C7A7;
      --soft:#A6B2C6; --text:#F1F5F9; --danger:#F43F5E; }
    * { box-sizing: border-box; }
    /* Window is larger than the capsule; body centers it so the drop shadow has
       transparent room on every side and is never clipped flat by the window edge. */
    html, body { margin: 0; height: 100%; background: transparent; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif; -webkit-user-select: none; }
    #rail { width: 48px; padding: 15px 0; border-radius: 22px; background: var(--glass);
      border: 1px solid var(--hair); box-shadow: 0 6px 18px rgba(0,0,0,.5);
      backdrop-filter: blur(22px) saturate(160%); -webkit-backdrop-filter: blur(22px) saturate(160%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; -webkit-app-region: drag; }
    .logo { width: 38px; height: 38px; border-radius: 13px; position: relative;
      background: linear-gradient(135deg, var(--blue), var(--teal));
      box-shadow: 0 0 0 1px rgba(255,255,255,.14), 0 6px 18px rgba(47,107,255,.45);
      display: flex; align-items: center; justify-content: center;
      -webkit-app-region: no-drag; cursor: pointer; transition: transform .15s ease; }
    .logo:hover { transform: scale(1.07); } .logo:active { transform: scale(.93); }
    .logo svg { width: 23px; height: 23px; }
    .badge { position: absolute; top: -5px; right: -5px; min-width: 17px; height: 17px;
      padding: 0 4px; border-radius: 9px; background: var(--danger); color: #fff;
      font-size: 9.5px; font-weight: 800; display: flex; align-items: center;
      justify-content: center; border: 2px solid #11151e; }
    .ico { -webkit-app-region: no-drag; cursor: pointer; width: 34px; height: 30px;
      border: 0; border-radius: 11px; background: var(--glass3); color: var(--soft);
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, color .15s, transform .15s; }
    .ico:hover { background: var(--hair); color: var(--text); }
    .ico:active { transform: scale(.92); }
    .ico.primary { background: linear-gradient(135deg, var(--blue), #4f86ff); color: #fff;
      box-shadow: 0 5px 14px rgba(47,107,255,.4); }
    .ico.close:hover { background: rgba(244,63,94,.18); color: #ff8696; }
    .ico svg { width: 17px; height: 17px; }
  </style>
</head>
<body>
  <div id="rail">
    <div class="logo" id="logo" title="Open OneChat">
      <svg viewBox="0 0 24 24"><path fill="#fff" d="M12 3.2c-5 0-9 3.35-9 7.5 0 2.36 1.3 4.46 3.36 5.84-.18 1.02-.78 2.2-1.76 3.16 1.66-.2 3.22-.86 4.3-1.78.92.2 1.9.38 3.1.38 5 0 9-3.35 9-7.5S17 3.2 12 3.2z"/></svg>
      <span class="badge">2</span>
    </div>
    <button class="ico primary" id="toggle" title="Open hub">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="ico close" id="close" title="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <script>
    const W = window.oneChatWidget || { toggleDrawer(){}, close(){} };
    const open = () => W.toggleDrawer();
    document.getElementById('logo').onclick = open;
    document.getElementById('toggle').onclick = open;
    document.getElementById('close').onclick = () => W.close();
  </script>
</body>
</html>
