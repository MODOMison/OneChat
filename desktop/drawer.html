<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    :root { --glass: rgba(17,21,30,0.72); --glass2: rgba(38,44,58,0.55);
      --glass3: rgba(255,255,255,0.06); --hair: rgba(255,255,255,0.10);
      --text:#F1F5F9; --soft:#A6B2C6; --faint:#6B7890; --blue:#2F6BFF; --danger:#F43F5E; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: transparent; overflow: hidden;
      font-family: 'Inter','Segoe UI',system-ui,sans-serif; font-size: 12.5px; color: var(--text);
      -webkit-user-select: none; -webkit-font-smoothing: antialiased; }
    svg { display: block; }
    #drawer { height: 100%; margin: 4px; display: flex; flex-direction: column;
      background: var(--glass); border: 1px solid var(--hair); border-radius: 22px;
      box-shadow: 0 12px 32px rgba(0,0,0,.5); overflow: hidden;
      backdrop-filter: blur(22px) saturate(160%); -webkit-backdrop-filter: blur(22px) saturate(160%); }

    .top { display: flex; align-items: center; gap: 8px; padding: 10px 10px 4px; -webkit-app-region: drag; }
    .title { font-weight: 700; font-size: 13px; color: var(--text); }
    .top .x { -webkit-app-region: no-drag; margin-left: auto; cursor: pointer; width: 26px; height: 26px;
      border: 0; border-radius: 8px; background: var(--glass3); color: var(--soft);
      display: flex; align-items: center; justify-content: center; }
    .top .x:hover { background: var(--hair); color: var(--text); }

    .search { margin: 8px 10px; height: 34px; display: flex; align-items: center; gap: 7px;
      padding: 0 11px; background: var(--glass3); border: 1px solid var(--hair); border-radius: 12px; }
    .search:focus-within { border-color: rgba(47,107,255,.55); }
    .search svg { width: 15px; height: 15px; color: var(--faint); }
    .search input { border: 0; outline: 0; background: transparent; flex: 1; color: var(--text);
      font-family: inherit; font-size: 12.5px; }
    .search input::placeholder { color: var(--faint); }

    .scroll { flex: 1; overflow-y: auto; padding: 2px 8px 8px; }
    .scroll::-webkit-scrollbar { width: 6px; }
    .scroll::-webkit-scrollbar-thumb { background: var(--hair); border-radius: 3px; }
    .empty { color: var(--soft); font-size: 12px; line-height: 1.7; text-align: center; padding: 26px 14px; }
    .empty code { display: inline-block; margin-top: 6px; padding: 4px 8px; border-radius: 7px;
      background: var(--glass3); border: 1px solid var(--hair); color: var(--text); font-size: 10.5px; }
    .thread { display: flex; align-items: center; gap: 9px; padding: 8px; border-radius: 13px; cursor: pointer; }
    .thread:hover { background: var(--glass3); }
    .av { width: 30px; height: 30px; border-radius: 10px; flex: 0 0 30px; display: flex;
      align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 10.5px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.12); }
    .tbody { min-width: 0; flex: 1; }
    .tname { font-weight: 600; font-size: 12.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tprev { color: var(--soft); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tplat { font-size: 8.5px; font-weight: 700; letter-spacing: .03em; text-transform: uppercase;
      padding: 2px 6px; border-radius: 6px; color: var(--soft); background: var(--glass3); border: 1px solid var(--hair); }

    #convo { display: none; flex-direction: column; height: 100%; }
    body.inconvo #list { display: none; }
    body.inconvo #convo { display: flex; }
    .chead { display: flex; align-items: center; gap: 8px; padding: 10px 11px 6px; }
    .iconbtn { -webkit-app-region: no-drag; cursor: pointer; width: 28px; height: 28px; border: 0;
      border-radius: 9px; background: var(--glass3); color: var(--soft); display: flex; align-items: center; justify-content: center; }
    .iconbtn:hover { background: var(--hair); color: var(--text); }
    .iconbtn svg { width: 17px; height: 17px; }
    /* Recipient identity — kept visually dominant so the user always knows who
       they're about to message (study's #1 error: 14/16 sent to wrong person).
       Photo is larger than the name: face/colour recognition is pre-attentive. */
    .cav { width: 38px; height: 38px; border-radius: 12px; flex: 0 0 38px; display: flex;
      align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 13px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.14); }
    .cname { font-weight: 700; font-size: 15px; }

    /* Send-guard toast — NEVER blocks the send. Appears only at a risk moment
       (first send to a recipient, or switching recipients) to confirm WHO it went
       to, with a quick Undo. Send-then-verify, not gate-before-send: catches the
       study's #1 wrong-recipient error without adding a hurdle to normal replies. */
    #sent { position: absolute; left: 9px; right: 9px; bottom: 52px; padding: 7px 9px; gap: 8px;
      align-items: center; background: var(--glass2); border: 1px solid var(--hair);
      border-radius: 12px; box-shadow: 0 6px 18px rgba(0,0,0,.4); opacity: 0;
      transform: translateY(6px); transition: opacity .18s ease, transform .18s ease;
      display: flex; pointer-events: none; }
    body.sent-toast #sent { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .sfav { width: 24px; height: 24px; border-radius: 8px; flex: 0 0 24px; display: flex;
      align-items: center; justify-content: center; color:#fff; font-weight: 800; font-size: 10px; }
    .sftext { flex: 1; min-width: 0; font-size: 11.5px; color: var(--soft);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sftext b { color: var(--text); }
    .sfundo { -webkit-app-region: no-drag; cursor: pointer; height: 24px; border: 0; border-radius: 8px;
      padding: 0 10px; font-family: inherit; font-size: 11px; font-weight: 700;
      background: var(--glass3); color: #ffb3bc; }
    .sfundo:hover { background: rgba(244,63,94,.18); color: #fff; }
    .msgs { flex: 1; overflow-y: auto; padding: 4px 11px; display: flex; flex-direction: column; gap: 6px; }
    .bub { max-width: 80%; padding: 7px 10px; border-radius: 13px; font-size: 12px; line-height: 1.35; }
    .bub.them { background: var(--glass2); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--hair); }
    .bub.me { background: linear-gradient(135deg, var(--blue), #4f86ff); color: #fff; align-self: flex-end;
      border-bottom-right-radius: 4px; box-shadow: 0 3px 10px rgba(47,107,255,.32); }
    /* In-flight send: dimmed until the connector confirms delivery. */
    .bub.me.pending { opacity: .5; }
    /* Delivery failed: red bubble + a tap-to-note so a silent failure is impossible. */
    .bub.me.failed { background: linear-gradient(135deg, var(--danger), #fb6f82); box-shadow: none; }
    .bub.me.failed::after { content: ' · not sent'; font-size: 10px; opacity: .85; }
    .composer { display: flex; align-items: center; gap: 7px; padding: 9px; border-top: 1px solid var(--hair); }
    .composer input { flex: 1; height: 32px; border: 1px solid var(--hair); border-radius: 12px;
      background: var(--glass3); padding: 0 12px; color: var(--text); font-family: inherit; font-size: 12.5px; outline: 0; }
    .composer input:focus { border-color: rgba(47,107,255,.55); }
    .send { cursor: pointer; width: 32px; height: 32px; flex: 0 0 32px; border: 0; border-radius: 12px;
      background: linear-gradient(135deg, var(--blue), #4f86ff); color: #fff; display: flex;
      align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(47,107,255,.4); }
    .send svg { width: 16px; height: 16px; }
  </style>
</head>
<body>
  <div id="drawer">
    <div id="list">
      <div class="top">
        <span class="title">OneChat</span>
        <button class="x" id="closeDrawer" title="Collapse">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="search" placeholder="Search messages, people, apps" />
      </div>
      <div class="scroll" id="threads"></div>
    </div>

    <div id="convo">
      <div class="chead">
        <button class="iconbtn" id="back" title="Back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="cav" id="cav"></div>
        <div>
          <div class="cname" id="cname"></div>
          <div class="tplat" id="cplat" style="display:inline-block; margin-top:3px"></div>
        </div>
      </div>
      <div class="msgs" id="msgs"></div>
      <div id="sent">
        <div class="sfav" id="sfav"></div>
        <div class="sftext">Sent to <b id="sfname"></b> on <span id="sfapp"></span></div>
        <button class="sfundo" id="sfUndo">Undo</button>
      </div>
      <div class="composer">
        <input id="reply" placeholder="Message" />
        <button class="send" id="sendBtn" title="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    const PLAT = { Telegram:'#229ED9', Discord:'#5865F2', Gmail:'#EA4335', iMessage:'#34C759', Instagram:'#C13584', SMS:'#2F6BFF' };
    const DATA = (window.oneChatWidget && window.oneChatWidget.liveData) || [];
    const W = window.oneChatWidget || { hideDrawer(){}, sendMessage:null };
    const $ = (id) => document.getElementById(id);
    let current = null;
    // Who we last sent to this session — used to fire the send-guard confirm only
    // when the recipient is new or has changed, not on every message.
    let lastSentTo = null;

    function renderThreads(filter='') {
      const q = filter.trim().toLowerCase();
      $('threads').innerHTML = '';
      if (DATA.length === 0) {
        $('threads').innerHTML =
          '<div class="empty"><b>No connected apps yet</b><br>' +
          'Connect Telegram to see your real chats:<br>' +
          '<code>cd connectors/telegram &amp;&amp; npm run login</code></div>';
        return;
      }
      DATA.filter(c => !q || (c.name+' '+c.app+' '+c.msgs.at(-1).t).toLowerCase().includes(q))
        .forEach(c => {
          const row = document.createElement('div');
          row.className = 'thread';
          row.innerHTML =
            `<div class="av" style="background:${PLAT[c.app]||'#6B7890'}">${c.initials}</div>` +
            `<div class="tbody"><div class="tname">${c.name}</div>` +
            `<div class="tprev">${c.msgs.at(-1).t}</div></div>` +
            `<div class="tplat">${c.app}</div>`;
          row.onclick = () => openConvo(c.id);
          $('threads').appendChild(row);
        });
    }
    function openConvo(id) {
      current = DATA.find(c => c.id === id);
      const color = PLAT[current.app] || '#6B7890';
      $('cname').textContent = current.name;
      $('cplat').textContent = current.app;
      $('cav').textContent = current.initials;
      $('cav').style.background = color;
      hideToast();
      drawMsgs();
      document.body.classList.add('inconvo');
    }

    let toastTimer = null, lastSent = null;
    function hideToast() {
      clearTimeout(toastTimer);
      document.body.classList.remove('sent-toast');
    }
    // Send always goes through immediately — no hurdle. On a recipient SWITCH we
    // surface a quick, non-blocking "Sent to X" toast with Undo so a wrong send is
    // caught after the fact rather than gated before it.
    async function send() {
      const v = $('reply').value.trim();
      if (!v || !current) return;
      const convo = current;
      const msg = { s:'me', t:v, pending:true };
      convo.msgs.push(msg);
      $('reply').value = '';
      drawMsgs();

      const switched = convo.id !== lastSentTo;
      lastSent = { convo, msg };
      lastSentTo = convo.id;
      if (switched) {
        $('sfname').textContent = convo.name;
        $('sfapp').textContent = convo.app;
        $('sfav').textContent = convo.initials;
        $('sfav').style.background = PLAT[convo.app] || '#6B7890';
        document.body.classList.add('sent-toast');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(hideToast, 4000);
      }

      // Actually deliver via the owning connector. If the bridge is absent (e.g.
      // opened outside Electron) treat it as a UI-only demo so nothing breaks.
      const res = W.sendMessage ? await W.sendMessage({ id: convo.id, text: v })
                                : { ok: true };
      msg.pending = false;
      if (!res.ok) {
        msg.failed = true;
        lastSentTo = null; // failed send shouldn't suppress the guard next time
      }
      if (current === convo) drawMsgs();
    }
    function undoLast() {
      if (lastSent) {
        const i = lastSent.convo.msgs.indexOf(lastSent.msg);
        if (i !== -1) lastSent.convo.msgs.splice(i, 1);
        if (lastSent.convo === current) drawMsgs();
        lastSentTo = null; // re-arm the guard for the next send
        lastSent = null;
      }
      hideToast();
    }
    function drawMsgs() {
      $('msgs').innerHTML = '';
      current.msgs.forEach(m => {
        const b = document.createElement('div');
        b.className = 'bub ' + (m.s === 'me' ? 'me' : 'them')
          + (m.pending ? ' pending' : '') + (m.failed ? ' failed' : '');
        b.textContent = m.t;
        $('msgs').appendChild(b);
      });
      $('msgs').scrollTop = $('msgs').scrollHeight;
    }

    $('closeDrawer').onclick = () => W.hideDrawer();
    $('back').onclick = () => document.body.classList.remove('inconvo');
    $('search').oninput = (e) => renderThreads(e.target.value);
    $('sendBtn').onclick = () => send();
    $('sfUndo').onclick = () => undoLast();
    $('reply').addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });

    renderThreads();
  </script>
</body>
</html>
